<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- JUDUL APLIKASI -->
    <title>Aplikasi Kasir - Coba Aplikasi</title>
    
    <!-- ICON WEBSITE (Favicon) - Ikon Ayam/Makanan -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" type="image/x-icon">

    <style>
        /* Reset CSS agar tampilan full screen tanpa celah putih */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mencegah scroll pada body utama */
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- IFRAME APLIKASI KASIR -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbwfotMKErCFFcv66mEvB58G6rx96SsPdQc3eZZFlx_R0vmxV1RDzb7RfzeWQjJ3HBi82w/exec" 
        allow="camera; microphone; geolocation; autoplay">
    </iframe>

</body>
</html>
